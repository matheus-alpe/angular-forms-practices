<fieldset class="fieldset bg-base-200 border-emerald-300 rounded-box w-xs border p-4">
  <legend class="fieldset-legend">Signal Form</legend>

  <label for="email" class="label">Email </label>
  <input id="email" type="text" class="input" [formField]="loginForm.email" />

  <label for="password" class="label">Password </label>
  <input id="password" type="password" class="input" [formField]="loginForm.password" />
</fieldset>
